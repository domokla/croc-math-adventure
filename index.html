<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Krokodilos Matek</title>
  <style>
    :root {
      --bg-top: #7ee081;
      --bg-bottom: #e8ffae;
      --panel: rgba(255, 255, 255, 0.92);
      --text: #164229;
      --accent: #ffb703;
      --accent-2: #ff7f50;
      --good: #5bd66f;
      --bad: #ff6b6b;
      --sky: #9be7ff;
      --shadow: 0 18px 40px rgba(22, 66, 41, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Comic Sans MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.7), transparent 25%),
        linear-gradient(180deg, var(--sky) 0%, var(--bg-top) 38%, var(--bg-bottom) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.25);
      z-index: 0;
    }

    body::before {
      width: 220px;
      height: 220px;
      top: -60px;
      left: -40px;
    }

    body::after {
      width: 160px;
      height: 160px;
      bottom: 12px;
      right: -20px;
    }

    .game {
      position: relative;
      z-index: 1;
      width: min(100%, 760px);
      background: var(--panel);
      border-radius: 28px;
      padding: 24px;
      box-shadow: var(--shadow);
      border: 4px solid rgba(255, 255, 255, 0.6);
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .game.flash-correct {
      animation: flash-correct 0.45s ease;
    }

    .game.flash-wrong {
      animation: flash-wrong 0.45s ease;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1;
    }

    .title-wrap p {
      margin: 8px 0 0;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .score {
      min-width: 132px;
      text-align: center;
      background: linear-gradient(180deg, #fff7d6, #ffe49a);
      border-radius: 20px;
      padding: 12px 16px;
      font-size: 1.35rem;
      font-weight: 900;
      box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.08);
    }

    .playfield {
      display: grid;
      gap: 20px;
      justify-items: center;
      text-align: center;
    }

    .croc-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 88px;
    }

    .croc {
      font-size: clamp(3.3rem, 9vw, 5rem);
      line-height: 1;
      transition: transform 0.35s ease;
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.15));
    }

    .croc.look-left {
      transform: scaleX(-1) rotate(-6deg);
    }

    .croc.look-right {
      transform: scaleX(1) rotate(6deg);
    }

    .croc.look-center {
      transform: scaleX(1) rotate(0deg);
    }

    .question-card {
      width: 100%;
      background: linear-gradient(180deg, #ffffff, #f5ffef);
      border-radius: 24px;
      padding: 24px 18px;
      box-shadow: inset 0 -5px 0 rgba(22, 66, 41, 0.08);
    }

    .question-label {
      margin: 0 0 10px;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .question-text {
      margin: 0;
      font-size: clamp(2.2rem, 7vw, 4rem);
      font-weight: 900;
      line-height: 1.15;
      word-break: break-word;
    }

    .feedback {
      min-height: 36px;
      margin: 0;
      font-size: 1.35rem;
      font-weight: 900;
    }

    .feedback.good {
      color: #22863a;
    }

    .feedback.bad {
      color: #c92a2a;
    }

    .answers {
      width: 100%;
      display: grid;
      gap: 14px;
    }

    .answers.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .answers.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .answer-btn,
    .restart-btn {
      border: none;
      border-radius: 22px;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      color: #14321f;
      background: linear-gradient(180deg, #fff7d6, #ffd772);
      box-shadow: 0 8px 0 rgba(200, 135, 0, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }

    .answer-btn {
      min-height: 82px;
      font-size: clamp(1.7rem, 4vw, 2.4rem);
      padding: 16px 10px;
    }

    .answer-btn:hover,
    .restart-btn:hover {
      transform: translateY(-2px) scale(1.01);
      filter: brightness(1.03);
    }

    .answer-btn:active,
    .restart-btn:active {
      transform: translateY(3px);
      box-shadow: 0 4px 0 rgba(200, 135, 0, 0.25);
    }

    .answer-btn:disabled {
      cursor: default;
      opacity: 0.75;
      transform: none;
    }

    .answer-btn.correct {
      background: linear-gradient(180deg, #d6ffd6, #8ce99a);
      box-shadow: 0 8px 0 rgba(46, 160, 67, 0.2);
    }

    .answer-btn.wrong {
      background: linear-gradient(180deg, #ffe1e1, #ff9f9f);
      box-shadow: 0 8px 0 rgba(201, 42, 42, 0.2);
    }

    .result {
      display: none;
      width: 100%;
      text-align: center;
      background: linear-gradient(180deg, #ffffff, #fdf7d7);
      border-radius: 24px;
      padding: 24px 18px;
      box-shadow: inset 0 -5px 0 rgba(22, 66, 41, 0.08);
    }

    .result.show {
      display: block;
    }

    .result h2 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 6vw, 3.2rem);
    }

    .result p {
      margin: 8px 0;
      font-size: 1.3rem;
      font-weight: 800;
    }

    .reward-image {
      display: none;
      width: min(100%, 320px);
      margin: 18px auto 0;
      border-radius: 22px;
      box-shadow: 0 14px 28px rgba(22, 66, 41, 0.2);
      border: 5px solid #fff;
      object-fit: cover;
      aspect-ratio: 4 / 5;
      background: #fff;
    }

    .reward-image.show {
      display: block;
      animation: pop-in 0.4s ease;
    }

    .restart-btn {
      display: none;
      min-height: 70px;
      margin-top: 18px;
      padding: 14px 26px;
      font-size: 1.4rem;
    }

    .restart-btn.show {
      display: inline-block;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes flash-correct {
      0% { background-color: rgba(91, 214, 111, 0.7); }
      100% { background-color: var(--panel); }
    }

    @keyframes flash-wrong {
      0% { background-color: rgba(255, 107, 107, 0.7); }
      100% { background-color: var(--panel); }
    }

    @keyframes pop-in {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 640px) {
      .game {
        padding: 18px;
        border-radius: 24px;
      }

      .header {
        justify-content: center;
      }

      .score {
        width: 100%;
      }

      .answers.three,
      .answers.two {
        grid-template-columns: 1fr;
      }

      .answer-btn {
        min-height: 74px;
      }
    }
  </style>
</head>
<body>
  <main class="game" id="game">
    <section class="header">
      <div class="title-wrap">
        <h1>Krokodilos Matek</h1>
        <p>Segíts a krokodilnak dönteni!</p>
      </div>
      <div class="score" id="score">0 / 10</div>
    </section>

    <section class="playfield">
      <div class="croc-row" aria-hidden="true">
        <div class="croc look-center" id="croc">🐊</div>
      </div>

      <section class="question-card" id="questionCard">
        <p class="question-label" id="questionLabel">Kérdés</p>
        <p class="question-text" id="questionText">Készen állsz?</p>
      </section>

      <p class="feedback" id="feedback" aria-live="polite"></p>

      <section class="answers three" id="answers" aria-label="Válaszok"></section>

      <section class="result" id="result">
        <h2 id="resultTitle">Vége a játéknak!</h2>
        <p id="resultScore">0 / 10</p>
        <p id="resultMessage">Próbáld újra!</p>
        <img class="reward-image" id="rewardImage" alt="Jutalomkép">
      </section>

      <button class="restart-btn" id="restartBtn" type="button">Új játék</button>
    </section>
  </main>

  <script>
    const TOTAL_QUESTIONS = 5;
    const PASS_SCORE = 4;
    const FEEDBACK_DELAY = 1400;
    const rewardImages = [
      "images/pic-1.jpg",
      "images/pic-2.jpg",
      "images/pic-3.jpg",
      "images/pic-4.jpg",
      "images/pic-5.jpg",
      "images/pic-6.jpg",
      "images/pic-7.jpg",
      "images/pic-8.jpg",
      "images/pic-9.jpg",
      "images/pic-10.jpg",
      "images/pic-11.jpg",
      "images/pic-12.jpg",
      "images/pic-13.jpg",
      "images/pic-14.jpg",
      "images/pic-15.jpg",
      "images/pic-16.jpg",
      "images/pic-17.jpg",
      "images/pic-18.jpg",
      "images/pic-19.jpg",
      "images/pic-20.jpg",
      "images/pic-21.jpg",
      "images/pic-22.jpg",
      "images/pic-23.jpg",
      "images/pic-24.jpg",
      "images/pic-25.jpg",
      "images/pic-26.jpg",
      "images/pic-27.jpg",
      "images/pic-28.jpg",
      "images/pic-29.jpg",
      "images/pic-30.jpg",
      "images/pic-31.jpg",
      "images/pic-32.jpg",
      "images/pic-33.jpg",
      "images/pic-34.jpg",
      "images/pic-35.jpg",
      "images/pic-36.jpg",
      "images/pic-37.jpg",
      "images/pic-38.jpg",
      "images/pic-39.jpg",
      "images/pic-40.jpg",
      "images/pic-41.jpg",
      "images/pic-42.jpg",
      "images/pic-43.jpg",
      "images/pic-44.jpg",
      "images/pic-45.jpg",
      "images/pic-46.jpg",
      "images/pic-47.jpg",
      "images/pic-48.jpg",
      "images/pic-49.jpg",
      "images/pic-50.png",
      "images/pic-51.jpg",
      "images/pic-52.png",
      "images/pic-53.png",
      "images/pic-54.jpg"
    ];

    const gameEl = document.getElementById("game");
    const scoreEl = document.getElementById("score");
    const crocEl = document.getElementById("croc");
    const questionLabelEl = document.getElementById("questionLabel");
    const questionTextEl = document.getElementById("questionText");
    const feedbackEl = document.getElementById("feedback");
    const answersEl = document.getElementById("answers");
    const resultEl = document.getElementById("result");
    const resultTitleEl = document.getElementById("resultTitle");
    const resultScoreEl = document.getElementById("resultScore");
    const resultMessageEl = document.getElementById("resultMessage");
    const rewardImageEl = document.getElementById("rewardImage");
    const restartBtn = document.getElementById("restartBtn");

    let score = 0;
    let questionIndex = 0;
    let currentQuestion = null;
    let isLocked = false;

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pickRandom(array) {
      return array[randInt(0, array.length - 1)];
    }

    function compareValues(left, right) {
      if (left < right) return "<";
      if (left > right) return ">";
      return "=";
    }

    // Keeps generated expressions simple and within 0..20.
    function createExpression() {
      const useAddition = Math.random() < 0.65;

      if (useAddition) {
        const a = randInt(0, 20);
        const b = randInt(0, 20 - a);
        return {
          text: `${a}+${b}`,
          value: a + b
        };
      }

      const a = randInt(0, 20);
      const b = randInt(0, a);
      return {
        text: `${a}-${b}`,
        value: a - b
      };
    }

    function createComparisonQuestion() {
      const left = randInt(0, 20);
      const right = randInt(0, 20);
      return {
        mode: "compare",
        label: "Melyik jel jó?",
        text: `${left} ? ${right}`,
        correctAnswer: compareValues(left, right),
        reaction: compareValues(left, right)
      };
    }

    function createExpressionVsNumberQuestion() {
      const expression = createExpression();
      const number = randInt(0, 20);
      return {
        mode: "compare",
        label: "Számolj és válassz jelet!",
        text: `${expression.text} ? ${number}`,
        correctAnswer: compareValues(expression.value, number),
        reaction: compareValues(expression.value, number)
      };
    }

    function createExpressionVsExpressionQuestion() {
      const leftExpression = createExpression();
      const rightExpression = createExpression();
      return {
        mode: "compare",
        label: "Melyik oldal nagyobb?",
        text: `${leftExpression.text} ? ${rightExpression.text}`,
        correctAnswer: compareValues(leftExpression.value, rightExpression.value),
        reaction: compareValues(leftExpression.value, rightExpression.value)
      };
    }

    function createTrueFalseQuestion() {
      const leftExpression = createExpression();
      const rightValue = randInt(0, 20);
      const sign = pickRandom(["<", ">", "="]);
      const isTrue = compareValues(leftExpression.value, rightValue) === sign;
      return {
        mode: "truefalse",
        label: "Igaz vagy hamis?",
        text: `${leftExpression.text} ${sign} ${rightValue}`,
        correctAnswer: isTrue ? "Igaz" : "Hamis",
        reaction: compareValues(leftExpression.value, rightValue)
      };
    }

    function createChainQuestion() {
      const a = randInt(0, 20);
      const b = randInt(0, 20);
      const c = randInt(0, 20);
      const sign1 = pickRandom(["<", ">"]);
      const sign2 = pickRandom(["<", ">"]);
      const isTrue =
        (sign1 === "<" ? a < b : a > b) &&
        (sign2 === "<" ? b < c : b > c);

      return {
        mode: "truefalse",
        label: "Igaz vagy hamis?",
        text: `${a} ${sign1} ${b} ${sign2} ${c}`,
        correctAnswer: isTrue ? "Igaz" : "Hamis",
        reaction: compareValues(a, c)
      };
    }

    const questionFactories = [
      createComparisonQuestion,
      createExpressionVsNumberQuestion,
      createExpressionVsExpressionQuestion,
      createTrueFalseQuestion,
      createChainQuestion
    ];

    function createAnswerButton(label) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "answer-btn";
      button.textContent = label;
      button.addEventListener("click", () => handleAnswer(label, button));
      return button;
    }

    function setCrocDirection(direction) {
      crocEl.classList.remove("look-left", "look-right", "look-center");
      if (direction === "<") {
        crocEl.classList.add("look-right");
      } else if (direction === ">") {
        crocEl.classList.add("look-left");
      } else {
        crocEl.classList.add("look-center");
      }
    }

    function renderQuestion() {
      currentQuestion = pickRandom(questionFactories)();
      isLocked = false;
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
      questionLabelEl.textContent = currentQuestion.label;
      questionTextEl.textContent = currentQuestion.text;
      setCrocDirection("=");
      answersEl.innerHTML = "";
      resultEl.classList.remove("show");

      const options = currentQuestion.mode === "compare"
        ? ["<", "=", ">"]
        : ["Igaz", "Hamis"];

      answersEl.className = `answers ${options.length === 3 ? "three" : "two"}`;
      options.forEach((option) => {
        answersEl.appendChild(createAnswerButton(option));
      });
    }

    function updateScore() {
      scoreEl.textContent = `${score} / ${TOTAL_QUESTIONS}`;
    }

    function flashGame(isCorrect) {
      gameEl.classList.remove("flash-correct", "flash-wrong");
      void gameEl.offsetWidth;
      gameEl.classList.add(isCorrect ? "flash-correct" : "flash-wrong");
    }

    function finishGame() {
      answersEl.innerHTML = "";
      answersEl.className = "answers";
      resultEl.classList.add("show");
      restartBtn.classList.add("show");
      resultTitleEl.textContent = "Vége a játéknak!";
      resultScoreEl.textContent = `${score} / ${TOTAL_QUESTIONS}`;

      if (score >= PASS_SCORE) {
        resultMessageEl.textContent = "Szuper! 🎉";
        rewardImageEl.src = pickRandom(rewardImages);
        rewardImageEl.classList.add("show");
      } else {
        resultMessageEl.textContent = "Még gyakorolj egy kicsit, menni fog!";
        rewardImageEl.removeAttribute("src");
        rewardImageEl.classList.remove("show");
      }

      questionLabelEl.textContent = "Kész";
      questionTextEl.textContent = "Nyomd meg az Új játék gombot!";
      setCrocDirection(score >= PASS_SCORE ? "<" : "=");
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
    }

    function handleAnswer(answer, button) {
      if (isLocked) return;
      isLocked = true;

      const isCorrect = answer === currentQuestion.correctAnswer;
      if (isCorrect) {
        score += 1;
      }

      updateScore();
      setCrocDirection(currentQuestion.reaction);
      flashGame(isCorrect);

      const buttons = [...answersEl.querySelectorAll(".answer-btn")];
      buttons.forEach((btn) => {
        btn.disabled = true;
        if (btn.textContent === currentQuestion.correctAnswer) {
          btn.classList.add("correct");
        }
      });

      if (!isCorrect) {
        button.classList.add("wrong");
      }

      feedbackEl.textContent = isCorrect ? "Ügyes vagy!" : "Ez most nem jó.";
      feedbackEl.className = `feedback ${isCorrect ? "good" : "bad"}`;

      questionIndex += 1;
      window.setTimeout(() => {
        if (questionIndex >= TOTAL_QUESTIONS) {
          finishGame();
          return;
        }
        renderQuestion();
      }, FEEDBACK_DELAY);
    }

    function startGame() {
      score = 0;
      questionIndex = 0;
      restartBtn.classList.remove("show");
      rewardImageEl.removeAttribute("src");
      rewardImageEl.classList.remove("show");
      updateScore();
      renderQuestion();
    }

    restartBtn.addEventListener("click", startGame);

    startGame();
  </script>
</body>
</html>
